<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #07090e; margin: 0; padding: 20px; color: #fff; font-family: sans-serif; }
    .container { display: flex; gap: 20px; justify-content: center; }
    .sheet-box { display: flex; flex-direction: column; align-items: center; }
    img { width: 512px; height: 512px; border: 2px solid #ff007f; border-radius: 8px; box-shadow: 0 0 15px rgba(255, 0, 127, 0.3); }
    h1, h2 { text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }
  </style>
</head>
<body>
  <h1 style="text-align:center;">New Base Parts Sheets</h1>
  <div class="container">
    <div class="sheet-box">
      <h2>Male Base Parts Sheet</h2>
      <img src="/male_base_parts.jpg" />
    </div>
    <div class="sheet-box">
      <h2>Female Base Parts Sheet</h2>
      <img src="/female_base_parts.jpg" />
    </div>
  </div>
</body>
</html>
