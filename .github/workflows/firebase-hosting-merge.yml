# main 브랜치에 머지/푸시되면 Firebase Hosting (live 채널) 으로 배포.
# 사용자가 GitHub repo Settings → Secrets 에 FIREBASE_SERVICE_ACCOUNT_BASEBALL_ALONE
# (Firebase 콘솔에서 발급한 서비스 계정 JSON 키 내용) 을 등록해야 동작함.
name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clean unnecessary files for deployment
        run: |
          # 배포에 사용되지 않는 문서, 백업, 임시 파일 및 개발 스크립트 일괄 삭제
          rm -rf DEVELOPMENT.md EVENTS.md MONETIZATION.md README.md clean.py generate_all_assets.py ninthinning-web.zip .venv
          echo "Cleanup completed successfully before Firebase deployment."

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASEBALL_ALONE }}
          channelId: live
          projectId: baseball-alone
