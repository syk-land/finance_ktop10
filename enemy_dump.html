
      <svg viewBox="0 0 100 120" width="100%" height="100%">
        
  <defs>
    <!-- CSS Animations Embedded directly inside SVG -->
    <style>
      @keyframes blink-anim {
        0%, 90%, 100% { transform: scaleY(1); }
        93%, 97% { transform: scaleY(0.05); }
      }
      .anya-eye-left {
        animation: blink-anim 4.2s ease-in-out infinite;
        transform-origin: 38.5px 38.5px;
      }
      .anya-eye-right {
        animation: blink-anim 4.2s ease-in-out infinite;
        transform-origin: 61.5px 38.5px;
      }
      
      @keyframes sleep-bubble-anim {
        0%, 100% { transform: scale(0.3) translate(-20px, 15px); opacity: 0; }
        40% { opacity: 0.8; }
        70% { transform: scale(1.1) translate(0px, -5px); opacity: 0.8; }
        90%, 100% { opacity: 0; }
      }
      .sleep-bubble {
        animation: sleep-bubble-anim 3.5s ease-in-out infinite;
        transform-origin: 34px 45px;
      }
      
      @keyframes spin-anim {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .spin-magic {
        animation: spin-anim 8s linear infinite;
        transform-origin: 50px 60px;
      }
      .spin-gun {
        animation: spin-anim 4s linear infinite;
        transform-origin: 0px -15px;
      }
      .spin-boss {
        animation: spin-anim 10s linear infinite;
        transform-origin: 70px 74px;
      }
      
      @keyframes pulse-light {
        0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 2px rgba(0, 229, 255, 0.5)); }
        50% { opacity: 1; filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.9)); }
      }
      .pulse-glow {
        animation: pulse-light 2s ease-in-out infinite;
      }

      @keyframes swing-weapon {
        0%, 100% { transform: translate(68.52px, 75.89px) rotate(15deg); }
        50% { transform: translate(69.52px, 73.89px) rotate(8deg); }
      }
      .swing-item {
        animation: swing-weapon 2.5s ease-in-out infinite;
        transform-origin: 68px 90px;
      }

      @keyframes angel-wing-flap {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05) translate(1px, -2px) rotate(2deg); }
      }
      .wing-flap {
        animation: angel-wing-flap 3s ease-in-out infinite;
        transform-origin: 50px 58px;
      }
    </style>

    <!-- 머리카락 그라디언트 (Anya Pink Hair Grad) -->
    <linearGradient id="anya-hair-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe4ec"></stop>
      <stop offset="35%" stop-color="#ffa8c5"></stop>
      <stop offset="85%" stop-color="#f06292"></stop>
      <stop offset="100%" stop-color="#c2185b"></stop>
    </linearGradient>
    
    <!-- 이마 헤어 그림자 -->
    <linearGradient id="face-shadow-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(125,55,80,0.45)"></stop>
      <stop offset="60%" stop-color="rgba(125,55,80,0.15)"></stop>
      <stop offset="100%" stop-color="rgba(125,55,80,0)"></stop>
    </linearGradient>
    
    <!-- 눈동자 에메랄드 그라디언트 (Maple Eye Grad) -->
    <radialGradient id="anya-eye-grad" cx="50%" cy="40%" r="50%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#a7ffeb"></stop>
      <stop offset="30%" stop-color="#64ffda"></stop>
      <stop offset="65%" stop-color="#00bfa5"></stop>
      <stop offset="90%" stop-color="#00796b"></stop>
      <stop offset="100%" stop-color="#004d40"></stop>
    </radialGradient>

    <!-- 에덴 스텔라 스타 훈장 그라디언트 -->
    <radialGradient id="stella-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="30%" stop-color="#fff59d"></stop>
      <stop offset="75%" stop-color="#fbc02d"></stop>
      <stop offset="100%" stop-color="#f57f17"></stop>
    </radialGradient>
    
    <!-- 눈동자 어두운 섀도 오버레이 -->
    <linearGradient id="eye-top-shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#091b15"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </linearGradient>

    <!-- 황금 장식 메탈릭 그라디언트 (Metallic Gold) -->
    <linearGradient id="gold-metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8e1"></stop>
      <stop offset="20%" stop-color="#ffe082"></stop>
      <stop offset="45%" stop-color="#ffb300"></stop>
      <stop offset="75%" stop-color="#ff8f00"></stop>
      <stop offset="100%" stop-color="#e65100"></stop>
    </linearGradient>

    <!-- 교복 검정 천 그라디언트 (Uniform Fabric Grad) -->
    <linearGradient id="eden-fabric-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"></stop>
      <stop offset="40%" stop-color="#2a2a2a"></stop>
      <stop offset="85%" stop-color="#141414"></stop>
      <stop offset="100%" stop-color="#050505"></stop>
    </linearGradient>

    <!-- 본드 하얀 털 그라디언트 -->
    <linearGradient id="bond-fur-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="35%" stop-color="#fafafa"></stop>
      <stop offset="75%" stop-color="#e0e0e0"></stop>
      <stop offset="100%" stop-color="#b0bec5"></stop>
    </linearGradient>

    <!-- 본드 귀 셰이딩 -->
    <linearGradient id="bond-ear-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#212121"></stop>
      <stop offset="100%" stop-color="#424242"></stop>
    </linearGradient>

    <!-- 뺨 홍조 그라디언트 -->
    <radialGradient id="anya-blush-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4081" stop-opacity="0.65"></stop>
      <stop offset="60%" stop-color="#ff4081" stop-opacity="0.25"></stop>
      <stop offset="100%" stop-color="#ff4081" stop-opacity="0"></stop>
    </radialGradient>

    <!-- 땅콩 봉지용 크라프트지 그라디언트 -->
    <linearGradient id="peanut-bag-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe0b2"></stop>
      <stop offset="50%" stop-color="#bcaaa4"></stop>
      <stop offset="100%" stop-color="#8d6e63"></stop>
    </linearGradient>

    <!-- 캐릭터와 대비되는 강력한 네온 차트루즈 아웃라인 필터 (메이플스토리 캐릭터 대비 효과) -->
    <filter id="char-outline" x="-30%" y="-30%" width="160%" height="160%">
      <feMorphology operator="dilate" radius="2.6" in="SourceAlpha" result="dilated"></feMorphology>
      <feFlood flood-color="#a6ff00" result="outline-color"></feFlood>
      <feComposite in="outline-color" in2="dilated" operator="in" result="outline"></feComposite>
      <feGaussianBlur in="outline" stdDeviation="0.6" result="blurred-outline"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blurred-outline"></feMergeNode>
        <feMergeNode in="outline"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    
    <!-- 몬스터용 대비되는 강렬한 마젠타/레드 아웃라인 필터 -->
    <filter id="enemy-outline" x="-30%" y="-30%" width="160%" height="160%">
      <feMorphology operator="dilate" radius="2.6" in="SourceAlpha" result="dilated"></feMorphology>
      <feFlood flood-color="#ff1744" result="outline-color"></feFlood>
      <feComposite in="outline-color" in2="dilated" operator="in" result="outline"></feComposite>
      <feGaussianBlur in="outline" stdDeviation="0.6" result="blurred-outline"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blurred-outline"></feMergeNode>
        <feMergeNode in="outline"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

        <g filter="url(#enemy-outline)">
          
      
        <ellipse cx="50" cy="108.5" rx="28.4" ry="7.6" fill="rgba(0,0,0,0.25)"></ellipse>
        <g class="character-bob">
          <!-- Bond Forger: Big Fluffy White Dog with Black Paws -->
          <circle cx="50" cy="74" r="25" fill="url(#bond-fur-grad)" stroke="#111" stroke-width="3"></circle>
          
          <!-- Fluffy Dog Ears -->
          <path d="M28,34 C18,34 14,48 22,52 C27,48 26,40 28,34 Z" fill="url(#bond-ear-grad)" stroke="#111" stroke-width="2.5"></path>
          <path d="M72,34 C82,34 86,48 78,52 C73,48 74,40 72,34 Z" fill="url(#bond-ear-grad)" stroke="#111" stroke-width="2.5"></path>
          
          <!-- Head -->
          <circle cx="50" cy="46" r="20" fill="url(#bond-fur-grad)" stroke="#111" stroke-width="3"></circle>
          
          <!-- Green Collar with golden bow tie -->
          <rect x="38" y="62" width="24" height="4" rx="2" fill="#2e7d32" stroke="#111" stroke-width="1.2"></rect>
          <circle cx="50" cy="64" r="2.8" fill="url(#gold-metal-grad)" stroke="#111" stroke-width="1.0"></circle>
          
          <!-- Big Cute Dog Eyes (MapleStory Dot style with highlights) -->
          <ellipse cx="42" cy="46" rx="4.5" ry="5.5" fill="#111"></ellipse>
          <ellipse cx="58" cy="46" rx="4.5" ry="5.5" fill="#111"></ellipse>
          <circle cx="43.2" cy="44.2" r="1.8" fill="#ffffff"></circle>
          <circle cx="59.2" cy="44.2" r="1.8" fill="#ffffff"></circle>
          <circle cx="41.0" cy="48.0" r="0.8" fill="#ffffff" opacity="0.6"></circle>
          <circle cx="57.0" cy="48.0" r="0.8" fill="#ffffff" opacity="0.6"></circle>
          
          <!-- Snout and Smile -->
          <ellipse cx="50" cy="52" rx="5.0" ry="3.5" fill="#f5f5f5" stroke="#111" stroke-width="1.2"></ellipse>
          <path d="M48,51 L52,51 L50,53 Z" fill="#111"></path>
          <path d="M47,54 Q50,56.5 53,54" stroke="#111" stroke-width="2.0" fill="none" stroke-linecap="round"></path>
          
          <!-- Fluffy body locks -->
          <path d="M26,78 C24,84 28,90 32,88" stroke="#111" stroke-width="2.0" fill="none"></path>
          <path d="M74,78 C76,84 72,90 68,88" stroke="#111" stroke-width="2.0" fill="none"></path>

          <!-- Stubby Black Paws (Bond's signature socks) -->
          <rect x="36" y="93" width="8.5" height="13.0" rx="3.5" fill="#212121" stroke="#111" stroke-width="2.8"></rect>
          <rect x="55.5" y="93" width="8.5" height="13.0" rx="3.5" fill="#212121" stroke="#111" stroke-width="2.8"></rect>
        </g>
      
        </g>
      </svg>
